<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinStocks - Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:#111827;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
  text-align:center;
  color:#38bdf8;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#cbd5e1;
  font-size:13px;
  margin-bottom:25px;
  line-height:1.4;
}

.form-group{
  margin-bottom:15px;
}

label{
  display:block;
  color:#fff;
  margin-bottom:6px;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  font-size:15px;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:#0ea5e9;
}

.bottom{
  text-align:center;
  margin-top:18px;
  color:#ccc;
  font-size:14px;
}

.bottom a{
  color:#38bdf8;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Welcome Back</h2>

<div class="subtitle">
Already registered? Sign in to manage your trades and portfolio.
</div>

<form>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="bottom">
Don't have an account? <a href="register.html">Register</a>
</div>

</div>

</body>
</html>
